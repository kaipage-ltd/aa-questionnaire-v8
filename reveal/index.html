<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; base-uri 'none'; form-action 'self'; object-src 'none'; frame-src 'none'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'; connect-src 'self'; font-src 'self' data:; media-src 'none'; worker-src 'none'; manifest-src 'self'; upgrade-insecure-requests">
<meta name="referrer" content="no-referrer">
<meta name="robots" content="noindex, nofollow, noarchive">

<title>The AI Readiness Diagnostic</title>
<script>
  if (new URLSearchParams(window.location.search).get('demoNav') === '1') {

</script>
<style>
  /* A+A brand faces (same self-hosted files the questionnaire uses). */
  @font-face {
    font-family: 'Instrument Serif';
    font-style: normal; font-weight: 400; font-display: swap;
    src: url('fonts/InstrumentSerif-Regular.ttf') format('truetype');
  }
  @font-face {
    font-family: 'Instrument Serif';
    font-style: italic; font-weight: 400; font-display: swap;
    src: url('fonts/InstrumentSerif-Italic.ttf') format('truetype');
  }
  @font-face {
    font-family: 'Instrument Sans';
    font-style: normal; font-weight: 400 600; font-display: swap;
    src: url('fonts/InstrumentSans-Variable.ttf') format('truetype-variations');
  }
  @font-face {
    font-family: 'Instrument Sans';
    font-style: italic; font-weight: 400 600; font-display: swap;
    src: url('fonts/InstrumentSans-Italic-Variable.ttf') format('truetype-variations');
  }

  :root {
    /* The reveal is the same cinematic world as the questionnaire, deepening:
       light type on the continuous dark atmosphere. (The PDF keeps its own light
       palette in api/_lib/design_tokens.js, a printed report stays on paper.) */
    --paper: #f7f3ed;          /* kept ONLY for the cream pill + light accents */
    --paper-dim: rgba(243, 234, 217, 0.06);
    --ink: #f3ead9;            /* light type on the dark world */
    --ink-soft: rgba(243, 234, 217, 0.74);
    --ink-faint: rgba(243, 234, 217, 0.42);
    --rule: rgba(243, 234, 217, 0.14);
    --dark: #1c1b18;
    --dark-soft: #bdbab5;
    --dark-faint: #8a8782;
    --gold: #cda86f;
    --serif: "Instrument Serif", "Iowan Old Style", "Palatino Linotype", Palatino, Georgia, serif;
    --sans: "Instrument Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    --mono: "Instrument Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }

  html { font-optical-sizing: auto; }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: #0b0805;
    font-family: var(--sans);
    -webkit-font-smoothing: antialiased;
    color: var(--ink);
    overflow: hidden;
  }

  /* Same continuous atmosphere as the questionnaire (archway, darkened + blurred). */
  body::before {
    content: ''; position: fixed; inset: -4%;
    background: url('../assets/img/hero-archway.jpg') center 35% / cover no-repeat;
    filter: blur(9px) brightness(0.40) saturate(0.92); transform: scale(1.06);
    z-index: 0; pointer-events: none;
    transition: filter 1300ms var(--ease-out, ease), transform 1600ms var(--ease-out, ease);
  }
  body::after {
    content: ''; position: fixed; inset: 0; z-index: 1; pointer-events: none;
    background:
      linear-gradient(155deg, rgba(8,6,3,0.46) 0%, rgba(8,6,3,0.70) 55%, rgba(6,4,2,0.84) 100%),
      radial-gradient(120% 90% at 78% 16%, rgba(229,188,121,0.09) 0%, transparent 55%),
      radial-gradient(ellipse 84% 76% at 48% 44%, transparent 40%, rgba(0,0,0,0.62) 100%);
    transition: background 1300ms var(--ease-out, ease);
  }
  /* Peak cards: the world comes forward (moderate, so the cream copy stays clean). */
  body.peak-forward::before { filter: blur(4px) brightness(0.52) saturate(0.98); transform: scale(1.03); }
  body.peak-forward::after {
    background:
      linear-gradient(155deg, rgba(8,6,3,0.40) 0%, rgba(8,6,3,0.60) 55%, rgba(6,4,2,0.74) 100%),
      radial-gradient(120% 92% at 78% 14%, rgba(229,188,121,0.14) 0%, transparent 55%),
      radial-gradient(ellipse 86% 78% at 48% 42%, transparent 44%, rgba(0,0,0,0.55) 100%);
  }

  html:not(.demo-nav-enabled) .demo-launch,
  html:not(.demo-nav-enabled) .demo-harness { display: none !important; }

  .stage {
    position: fixed;
    inset: 0;
    width: 100vw;
    height: 100vh;
    height: 100dvh;
    background: transparent;
    z-index: 2;
    overflow: hidden;
  }

  .progress {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    display: flex;
    gap: 4px;
    padding: calc(14px + env(safe-area-inset-top, 0px)) max(18px, env(safe-area-inset-right, 0px)) 14px max(18px, env(safe-area-inset-left, 0px));
    z-index: 40;
  }
  .seg {
    flex: 1;
    height: 2px;
    background: rgba(243, 234, 217, 0.18);
    border-radius: 2px;
    overflow: hidden;
  }
  .seg.dark-ctx { background: rgba(250, 248, 242, 0.20); }
  .seg > i {
    display: block;
    height: 100%;
    width: 0;
    background: var(--ink);
    border-radius: 2px;
    transition: width 240ms ease;
  }
  .seg.dark-ctx > i { background: var(--paper); }
  .seg.done > i,
  .seg.active > i { width: 100%; }

  .zone {
    position: absolute;
    top: 0;
    bottom: 0;
    width: 32%;
    z-index: 30;
    cursor: pointer;
  }
  .zone.prev { left: 0; width: 24%; }
  .zone.next { right: 0; width: 76%; }
  body.is-close-card .zone.next {
    pointer-events: none;
    cursor: default;
  }

  .card {
    position: absolute;
    inset: 0;
    display: none;
    flex-direction: column;
    justify-content: flex-start;
    align-items: center;
    /* Reduced from clamp(82-128) so dense cards (cost, close) fit more screens. */
    padding: clamp(58px, 7vh, 100px) clamp(36px, 8vw, 112px) clamp(74px, 8vh, 108px);
    text-align: left;
    overflow-y: auto;
    overscroll-behavior: contain;
  }
  .card.is-active { display: flex; }
  .card.dark { background: transparent; color: var(--paper); }
  /* margin:auto centers the content when there is room and lets it scroll
     (never clip top or bottom) when a persona's copy runs long. */
  .card-inner {
    position: relative;
    z-index: 2;
    width: min(100%, 680px);
    margin: auto 0;
  }
  .card-inner.is-wide { width: min(100%, 760px); }
  .card-inner.finale-inner { width: min(100%, 1080px); }

  /* Cinematic media behind every reveal card. Each beat gets its own image, but
     the overlay keeps the whole journey inside the same dark A+A world. */
  .card.has-media { background: #0b0a07; }
  .card-media {
    position: absolute;
    inset: 0;
    z-index: 0;
    background-size: cover;
    background-position: center;
  }
  .card-media::after {
    content: '';
    position: absolute;
    inset: 0;
    background:
      linear-gradient(to bottom, rgba(10,9,7,0.58) 0%, rgba(10,9,7,0.62) 44%, rgba(10,9,7,0.82) 100%),
      linear-gradient(to right, rgba(10,9,7,0.42) 0%, rgba(10,9,7,0.08) 60%, rgba(10,9,7,0) 95%);
  }
  .card.is-close .card-media {
    background-size: cover;
    background-position: center;
  }
  .card.is-close .card-media::after {
    background:
      linear-gradient(90deg, rgba(7,6,5,0.82) 0%, rgba(7,6,5,0.74) 44%, rgba(7,6,5,0.30) 100%),
      radial-gradient(78% 86% at 28% 44%, rgba(0,0,0,0.34) 0%, rgba(0,0,0,0.72) 100%);
  }
  .card.is-active .card-media { animation: mediaSettle 7s cubic-bezier(0.22, 0.61, 0.36, 1) both; }
  @keyframes mediaSettle { from { transform: scale(1.06); } to { transform: scale(1); } }
  @media (prefers-reduced-motion: reduce) {
    .card-media { animation: none !important; transform: none !important; }
  }

  /* Image slots (cost + fit cards). Currently filled with authored interim line
     art in the brand register; the Midjourney photographic assets specified in
     reveal_illustration_pass_v1.md replace the SVGs with <img> when they land.
     The card switches to a content-left / image-right layout so copy never runs
     under the image. */
  .card.has-visual { align-items: flex-start; }
  .card.has-visual .card-inner,
  .card.has-visual .card-inner.is-wide { width: min(56%, 468px); }
  .visual {
    position: absolute;
    z-index: 1;
    right: clamp(42px, 7vw, 128px);
    top: 50%;
    width: min(26vw, 320px);
    height: min(40vh, 360px);
    transform: translateY(-50%);
    pointer-events: none;
  }
  .visual svg { width: 100%; height: 100%; display: block; }

  .eyebrow {
    font-family: var(--mono);
    font-size: 10.5px;
    letter-spacing: 0.20em;
    text-transform: uppercase;
    color: var(--ink-faint);
    margin-bottom: 30px;
  }
  .dark .eyebrow { color: var(--dark-faint); }
  .lede {
    font-size: 24px;
    line-height: 1.4;
    font-weight: 400;
    color: var(--ink);
    letter-spacing: 0;
  }
  .dark .lede { color: var(--paper); }
  .reveal-h {
    font-family: var(--serif);
    font-weight: 400;
    font-size: clamp(32px, 5vw, 52px);
    line-height: 1.08;
    letter-spacing: 0;
    color: var(--ink);
    margin: 0 0 16px;
  }
  .dark .reveal-h { color: var(--paper); }
  .reveal-h em { font-style: italic; }
  p.body {
    font-size: 19px;
    line-height: 1.54;
    color: var(--ink-soft);
    margin-top: 14px;
  }
  .dark p.body { color: var(--dark-soft); }
  .body em, .lede em { font-style: italic; }
  .body strong, .lede strong { font-weight: 600; color: var(--ink); }
  .dark .body strong, .dark .lede strong { color: var(--paper); }

  .card.is-active .anim {
    animation: rise 620ms cubic-bezier(0.22, 0.61, 0.36, 1) both;
  }
  .card.is-active .anim.d1 { animation-delay: 90ms; }
  .card.is-active .anim.d2 { animation-delay: 220ms; }
  .card.is-active .anim.d3 { animation-delay: 360ms; }
  /* The held beat: the reframe's conclusion arrives after the setup has landed. */
  .card.is-active .anim.d4 { animation-delay: 900ms; }
  @keyframes rise {
    from { opacity: 0; transform: translateY(14px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .turn-name {
    font-family: var(--serif);
    font-size: 56px;
    line-height: 1;
    font-weight: 400;
    margin-bottom: 28px;
  }
  .num-label {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--ink-faint);
    margin-bottom: 18px;
  }
  .num {
    font-size: 220px;
    line-height: 0.92;
    font-weight: 500;
    letter-spacing: 0;
    font-variant-numeric: tabular-nums;
  }
  .num-after {
    font-size: 20px;
    line-height: 1.55;
    color: var(--ink-soft);
    margin-top: 22px;
    opacity: 0;
  }
  .card.is-active .num-after.show {
    animation: rise 560ms ease both;
    animation-delay: 250ms;
  }
  .score-meaning {
    font-size: 17px;
    line-height: 1.55;
    color: var(--ink-faint);
    margin-top: 16px;
  }
  .score-meaning strong { color: var(--ink); }
  .close-line {
    font-size: 21px;
    line-height: 1.45;
    color: var(--ink);
    margin-top: 18px;
  }
  .score-brief {
    width: min(100%, 680px);
    margin: 24px auto 0;
    text-align: left;
  }
  .score-brief.brief-panel {
    border-color: rgba(243, 234, 217, 0.16);
  }
  .score-brief .brief-row {
    grid-template-columns: 142px minmax(0, 1fr);
    padding: 9px 0;
  }
  .score-brief .brief-value {
    font-size: 15.4px;
    line-height: 1.34;
  }
  .shape-read-panel {
    margin-top: 18px;
  }
  .shape-read-panel .brief-row {
    padding: 8px 0;
  }
  .shape-read-panel .brief-value {
    font-size: 15.6px;
    line-height: 1.34;
  }
  .basis-panel {
    margin-top: 24px;
  }
  .basis-panel .brief-row {
    grid-template-columns: 118px minmax(0, 1fr);
    padding: 9px 0;
  }
  .basis-panel .brief-value {
    font-size: 15.6px;
    line-height: 1.36;
    color: var(--ink-soft);
  }

  .bars { margin-top: 26px; }
  .bar-row { margin-bottom: 18px; }
  .bar-head {
    display: flex;
    justify-content: flex-start;
    align-items: baseline;
    gap: 8px;
    margin-bottom: 7px;
  }
  .bar-name {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--ink-soft);
  }
  .bar-val {
    font-size: 22px;
    font-weight: 500;
    font-variant-numeric: tabular-nums;
  }
  .bar-track {
    position: relative;
    height: 4px;
    background: rgba(243, 234, 217, 0.12);
    border-radius: 3px;
    overflow: visible;
    margin-top: 18px;
  }
  .bar-fill {
    position: relative;
    z-index: 1;
    height: 100%;
    width: 0;
    background: var(--ink);
    border-radius: 3px;
  }
  .bar-myval {
    position: absolute;
    right: 0;
    top: -22px;
    transform: translateX(50%);
    font-size: 18px;
    font-weight: 500;
    font-variant-numeric: tabular-nums;
    color: var(--ink);
  }
  .bar-bench {
    position: absolute;
    top: -5px;
    width: 2px;
    height: 14px;
    background: var(--ink-faint);
    z-index: 0;
  }
  .bar-benchval {
    position: absolute;
    left: 50%;
    top: -18px;
    transform: translateX(-50%);
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.08em;
    color: var(--ink-faint);
    white-space: nowrap;
  }
  .bar-row.hurdle .bar-name,
  .bar-row.hurdle .bar-val,
  .bar-row.hurdle .pglyph { color: var(--ink); }
  .bar-row.muted .bar-name,
  .bar-row.muted .bar-val,
  .bar-row.muted .pglyph { color: var(--ink-faint); }
  .bar-row.muted .bar-fill { background: var(--ink-faint); }
  .card.is-active .bar-fill.go { transition: width 900ms cubic-bezier(0.22, 0.61, 0.36, 1); }
  .pglyph {
    display: inline-flex;
    color: var(--ink-soft);
  }
  .pglyph svg {
    width: 18px;
    height: 18px;
    display: block;
  }
  .pglyph.big {
    margin-bottom: 18px;
  }
  .pglyph.big svg {
    width: 64px;
    height: 64px;
  }
  .pglyph.eyebrow-glyph {
    margin-right: 8px;
    vertical-align: middle;
  }
  .glyph-row {
    display: flex;
    gap: 18px;
    justify-content: center;
    margin-bottom: 22px;
  }
  .glyph-row .pglyph.off svg {
    width: 30px;
    height: 30px;
    color: var(--paper);
    opacity: 0.28;
  }
  .glyph-row .pglyph.on svg {
    width: 38px;
    height: 38px;
    color: var(--paper);
    opacity: 1;
  }
  .constraint-tag {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--ink-faint);
    margin-top: 18px;
  }
  .more-drawer {
    margin-top: 22px;
  }
  .more-summary {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--ink-faint);
    cursor: pointer;
    list-style: none;
    display: inline-flex;
    gap: 8px;
    align-items: center;
  }
  .more-summary::after {
    content: '▾';
    transition: transform 0.2s ease;
  }
  .more-drawer[open] .more-summary::after { transform: rotate(180deg); }
  .more-summary::-webkit-details-marker { display: none; }
  .more-drawer > :not(summary) {
    margin-top: 14px;
    animation: rise 420ms ease both;
  }
  .dark .more-summary { color: var(--dark-soft); }

  .receipt {
    display: grid;
    grid-template-columns: 38px minmax(0, 1fr);
    gap: 16px;
    padding: 14px 0;
    border-top: 1px solid var(--rule);
    color: var(--ink);
  }
  .receipt:last-of-type { border-bottom: 1px solid var(--rule); }
  .receipt .rn {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.1em;
    color: var(--ink-faint);
    padding-top: 4px;
    flex: none;
  }
  .receipt-prompt {
    font-family: var(--mono);
    font-size: 10px;
    line-height: 1.35;
    letter-spacing: 0.13em;
    text-transform: uppercase;
    color: var(--ink-faint);
    margin-bottom: 6px;
  }
  .receipt-answer {
    font-size: 17px;
    line-height: 1.38;
    font-style: italic;
    color: var(--ink);
  }
  .receipt-read {
    font-size: 16px;
    line-height: 1.42;
    color: var(--ink-soft);
    margin-top: 7px;
  }
  .receipt-proof {
    font-family: var(--mono);
    font-size: 9.5px;
    line-height: 1.45;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--ink-faint);
    margin-top: 7px;
  }
  .brief-panel {
    margin-top: 24px;
    border-top: 1px solid var(--rule);
    border-bottom: 1px solid var(--rule);
  }
  .calibration-panel {
    margin-top: 22px;
  }
  .calibration-panel .brief-row {
    padding: 11px 0;
  }
  .calibration-panel .brief-value {
    font-size: 16.5px;
    line-height: 1.4;
  }
  .constraint-panel {
    margin-top: 22px;
  }
  .constraint-panel .brief-row {
    padding: 10px 0;
  }
  .constraint-panel .brief-value {
    font-size: 16.2px;
    line-height: 1.38;
  }
  .cost-model-panel,
  .compound-panel,
  .implementation-panel {
    margin-top: 16px;
  }
  .cost-model-panel .brief-row,
  .compound-panel .brief-row,
  .implementation-panel .brief-row {
    padding: 10px 0;
  }
  .cost-model-panel .brief-value,
  .compound-panel .brief-value,
  .implementation-panel .brief-value {
    font-size: 16.2px;
    line-height: 1.38;
  }
  .brief-row {
    display: grid;
    grid-template-columns: 138px minmax(0, 1fr);
    gap: 18px;
    padding: 10px 0;
    border-top: 1px solid rgba(243, 234, 217, 0.12);
  }
  .brief-row:first-child { border-top: 0; }
  .brief-label {
    font-family: var(--mono);
    font-size: 10px;
    line-height: 1.4;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--ink-faint);
    padding-top: 4px;
  }
  .brief-value {
    font-size: 17px;
    line-height: 1.45;
    color: var(--ink);
  }
  .brief-row.is-quote .brief-value { font-style: italic; }
  .output-list {
    margin-top: 18px;
    border-top: 1px solid var(--rule);
    border-bottom: 1px solid var(--rule);
  }
  .output-item {
    display: grid;
    grid-template-columns: 34px minmax(0, 1fr);
    gap: 14px;
    padding: 11px 0;
    border-top: 1px solid rgba(243, 234, 217, 0.12);
    font-size: 17px;
    line-height: 1.42;
    color: var(--ink);
  }
  .output-item:first-child { border-top: 0; }
  .output-index {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.12em;
    color: var(--ink-faint);
    padding-top: 5px;
  }

  .quote {
    font-family: var(--serif);
    font-size: 38px;
    line-height: 1.28;
    font-style: italic;
    font-weight: 400;
    color: var(--paper);
    margin: 8px 0 0;
  }
  .quote .w {
    display: inline-block;
    opacity: 0;
    transform: translateY(8px);
  }
  .quote .w.in {
    opacity: 1;
    transform: translateY(0);
    transition: opacity 260ms ease, transform 320ms cubic-bezier(0.22, 0.61, 0.36, 1);
  }
  .quote-mark {
    font-size: 38px;
    font-style: italic;
    color: var(--dark-faint);
  }
  .quote-after {
    font-size: 18px;
    line-height: 1.6;
    color: #d8d0be;
    margin-top: 30px;
    opacity: 0;
  }
  .quote-after.in { opacity: 1; transition: opacity 700ms ease; }
  .quote-lens {
    margin-top: 22px;
    border-color: rgba(250, 248, 242, 0.18);
    opacity: 0;
  }
  .quote-lens.in { opacity: 1; transition: opacity 700ms ease; }
  .quote-lens .brief-row {
    border-top-color: rgba(250, 248, 242, 0.13);
    grid-template-columns: 150px minmax(0, 1fr);
    padding: 10px 0;
  }
  .quote-lens .brief-label {
    color: var(--dark-faint);
  }
  .quote-lens .brief-value {
    color: #e6decd;
    font-size: 15.6px;
    line-height: 1.38;
  }
  .reframe-panel {
    margin-top: 24px;
    border-color: rgba(250, 248, 242, 0.20);
  }
  .reframe-panel .brief-row {
    border-top-color: rgba(250, 248, 242, 0.14);
    grid-template-columns: 158px minmax(0, 1fr);
    padding: 11px 0;
  }
  .reframe-panel .brief-label {
    color: var(--dark-faint);
  }
  .reframe-panel .brief-value {
    color: #e6decd;
    font-size: 16.2px;
    line-height: 1.38;
  }
  .said {
    font-size: 21px;
    font-style: italic;
    color: var(--ink);
    padding: 7px 0 7px 18px;
    border-left: 2px solid var(--ink);
    margin: 10px 0;
  }
  .cta {
    display: inline-flex;
    align-items: center;
    gap: 11px;
    margin-top: 24px;
    padding: 16px 32px;
    background: var(--paper);
    color: #22211f;            /* ink on the cream pill (--ink is now light) */
    font-family: var(--sans);
    font-size: 14.5px;
    font-weight: 600;
    letter-spacing: 0.005em;
    text-transform: none;
    border: none;
    border-radius: 60px;
    cursor: pointer;
    text-decoration: none;
    transition: transform 220ms cubic-bezier(0.22, 0.61, 0.36, 1), box-shadow 220ms ease, background 200ms ease;
  }
  .cta:hover {
    transform: translateY(-2px);
    background: #fffdf9;
    box-shadow: 0 14px 34px rgba(0, 0, 0, 0.34);
  }

  /* Dark close card: the invitation reads as a brand dark section with a cream
     pill. Dark-context variants for its denser content. */
  .dark .close-line { color: var(--paper); }
  .dark .qualifier { color: var(--dark-faint); }
  .dark .output-list { border-color: rgba(250, 248, 242, 0.22); }
  .dark .output-item { color: var(--paper); border-top-color: rgba(250, 248, 242, 0.14); }
  .dark .output-index { color: var(--dark-faint); }
  .dark .calendar-panel {
    background: rgba(250, 248, 242, 0.06);
    border-color: rgba(250, 248, 242, 0.22);
    color: var(--dark-soft);
  }
  .qualifier {
    font-family: var(--mono);
    font-size: 11px;
    line-height: 1.6;
    letter-spacing: 0.04em;
    color: var(--ink-faint);
    margin-top: 15px;
  }
  .calendar-panel {
    display: none;
    margin-top: 22px;
    border: 1px solid var(--rule);
    background: var(--paper-dim);
    padding: 18px;
    font-family: var(--mono);
    font-size: 11px;
    line-height: 1.6;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    color: var(--ink-soft);
  }
  .calendar-panel.is-open { display: block; }

  /* ── Finale layouts: cost, first move, booking ───────────────── */
  .finale-grid {
    display: grid;
    grid-template-columns: minmax(0, 1.04fr) minmax(280px, 0.7fr);
    gap: clamp(34px, 6vw, 92px);
    align-items: center;
  }
  .finale-main {
    max-width: 720px;
  }
  .finale-main .reveal-h {
    font-size: clamp(48px, 7vw, 86px);
    line-height: 0.98;
    margin-bottom: 22px;
  }
  .finale-main .lede {
    max-width: 560px;
    font-size: clamp(21px, 2.2vw, 28px);
    line-height: 1.34;
  }
  .cost-impact {
    min-height: 380px;
    border-left: 1px solid rgba(243, 234, 217, 0.28);
    padding-left: clamp(24px, 4vw, 46px);
    display: flex;
    flex-direction: column;
    justify-content: center;
  }
  .impact-kicker,
  .move-kicker {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ink-faint);
    margin-bottom: 18px;
  }
  .impact-line {
    font-family: var(--serif);
    font-size: clamp(32px, 4vw, 54px);
    line-height: 1.04;
    color: var(--ink);
    max-width: 360px;
  }
  .cost-impact .impact-glyph {
    margin-bottom: 24px;
  }
  .cost-impact .impact-glyph svg {
    width: 58px;
    height: 58px;
    color: var(--ink-soft);
  }
  .impact-line em { font-style: italic; }
  .move-stage {
    display: grid;
    grid-template-columns: minmax(220px, 0.52fr) minmax(0, 1fr);
    gap: clamp(34px, 6vw, 82px);
    align-items: center;
  }
  .move-symbol {
    min-height: 420px;
    border: 1px solid rgba(243, 234, 217, 0.20);
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: clamp(24px, 3vw, 38px);
    background: rgba(5,4,3,0.20);
  }
  .move-symbol .pglyph svg {
    width: clamp(92px, 12vw, 142px);
    height: clamp(92px, 12vw, 142px);
    color: var(--ink);
    opacity: 0.88;
  }
  .move-symbol-word {
    font-family: var(--serif);
    font-size: clamp(48px, 7vw, 92px);
    line-height: 0.9;
    color: var(--ink);
  }
  .move-copy .reveal-h {
    font-size: clamp(46px, 6.6vw, 82px);
    line-height: 0.98;
  }
  .move-rail {
    margin-top: 34px;
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 12px;
  }
  .move-step {
    border-top: 1px solid rgba(243, 234, 217, 0.26);
    padding-top: 14px;
  }
  .move-step-index {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.14em;
    color: var(--ink-faint);
    margin-bottom: 11px;
  }
  .move-step-title {
    font-family: var(--serif);
    font-size: 25px;
    line-height: 1;
    color: var(--ink);
    margin-bottom: 9px;
  }
  .move-step-body {
    font-size: 14.5px;
    line-height: 1.35;
    color: var(--ink-soft);
  }
  .card-inner.close-inner {
    width: min(100%, 860px);
    margin: auto auto auto 0;
  }
  .close-stage {
    max-width: 760px;
  }
  .close-stage .glyph-row {
    justify-content: flex-start;
    margin-bottom: 34px;
  }
  .close-stage .reveal-h {
    font-size: clamp(52px, 8vw, 96px);
    line-height: 0.94;
    margin-bottom: 24px;
  }
  .close-stage .lede {
    max-width: 620px;
    font-size: clamp(21px, 2.2vw, 29px);
    line-height: 1.34;
  }
  .close-action {
    display: flex;
    align-items: center;
    gap: 22px;
    flex-wrap: wrap;
    margin-top: 34px;
  }
  .close-action .cta {
    margin-top: 0;
    padding: 18px 38px;
    font-size: 15px;
  }
  .close-action .qualifier {
    max-width: 320px;
    margin-top: 0;
    color: rgba(247, 243, 237, 0.54);
  }

  /* ── Reveal opening wordmark (R9) ─────────────────────────────── */
  .reveal-wordmark {
    width: clamp(168px, 22vw, 220px);
    color: var(--ink);
    margin-bottom: clamp(28px, 4vh, 44px);
  }
  .reveal-wordmark svg { width: 100%; height: auto; display: block; }

  /* ── Wrapped-style scale (each beat its own composition) ──────── */
  .turn-name { font-size: clamp(72px, 11vw, 116px); }
  .num { font-size: clamp(180px, 30vw, 300px); }
  .num-wrap {
    display: flex;
    align-items: baseline;
    justify-content: center;
    gap: 14px;
  }
  .num-denom {
    font-family: var(--serif);
    font-size: clamp(40px, 7vw, 60px);
    font-weight: 400;
    color: var(--ink-faint);
    letter-spacing: 0;
  }
  .quote { font-size: clamp(34px, 5.4vw, 50px); }

  /* ── Shape: benchmark marker + plain-language meaning ─────────── */
  .bar-plain {
    margin-top: 7px;
    font-size: 14.5px;
    line-height: 1.35;
    color: var(--ink-soft);
  }
  .bar-row.muted .bar-plain { color: var(--ink-faint); }
  .bench-key {
    margin-top: 18px;
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--ink-faint);
  }

  /* ── Hurdle: folded supporting evidence (answers support, not centre) ─ */
  .support {
    margin-top: 26px;
    border-top: 1px solid var(--rule);
    padding-top: 16px;
  }
  .support-label {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--ink-faint);
    margin-bottom: 12px;
  }
  .support-row { margin-bottom: 12px; }
  .support-answer {
    font-size: 16px;
    font-style: italic;
    line-height: 1.4;
    color: var(--ink);
  }
  .support-read {
    font-size: 14.5px;
    line-height: 1.42;
    color: var(--ink-soft);
    margin-top: 3px;
  }

  /* ── Per-card advance affordance (R3): a real button, not a hint ─ */
  .card-advance {
    position: absolute;
    bottom: calc(28px + env(safe-area-inset-bottom, 0px));
    left: 50%;
    transform: translateX(-50%);
    z-index: 36;
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 14px 32px;
    background: var(--paper-dim);
    border: 1.5px solid var(--ink);
    border-radius: 999px;
    color: var(--ink);
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 200ms ease, color 200ms ease, transform 200ms ease;
  }
  .card-advance::after { content: '\2192'; }
  .card-advance:hover {
    background: var(--ink);
    color: var(--paper);
    transform: translateX(-50%) translateY(-2px);
  }
  .card-advance.on-dark { background: rgba(250, 248, 242, 0.08); border-color: var(--paper); color: var(--paper); }
  .card-advance.on-dark:hover { background: var(--paper); color: var(--dark); }

  /* Touch: hover states latch after a tap on iOS, so reset them; and keep the
     densest card copy clear of the home indicator. */
  @media (hover: none) and (pointer: coarse) {
    .card-advance:hover { background: var(--paper-dim); color: var(--ink); transform: translateX(-50%); }
    .card-advance.on-dark:hover { background: rgba(250, 248, 242, 0.08); color: var(--paper); transform: translateX(-50%); }
    .cta:hover { transform: none; box-shadow: none; background: var(--paper); }
    .card { padding-bottom: calc(clamp(74px, 8vh, 108px) + env(safe-area-inset-bottom, 0px)); }
  }

  .hint {
    display: none;
    position: absolute;
    bottom: calc(18px + env(safe-area-inset-bottom, 0px));
    left: 0;
    right: 0;
    text-align: center;
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--ink-faint);
    z-index: 35;
    pointer-events: none;
  }
  .hint.on-dark { color: var(--dark-faint); }
  .beat-tag {
    position: absolute;
    top: 34px;
    right: 22px;
    font-family: var(--mono);
    font-size: 9.5px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ink-faint);
    z-index: 35;
  }
  .beat-tag.on-dark { color: var(--dark-faint); }

  .loading {
    position: fixed;
    inset: 0;
    display: grid;
    place-items: center;
    padding: 0 32px;
    text-align: center;
    background: rgba(8, 6, 3, 0.55);
    z-index: 80;
    font-family: var(--mono);
    font-size: 11px;
    line-height: 1.6;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ink-soft);
  }
  .loading.is-hidden { display: none; }

  .demo-launch {
    position: fixed;
    right: 18px;
    bottom: 18px;
    z-index: 90;
    border: 1px solid var(--ink);
    background: var(--ink);
    color: var(--paper);
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 10px 12px;
    cursor: pointer;
  }
  .demo-harness {
    position: fixed;
    right: 18px;
    bottom: 58px;
    z-index: 91;
    width: min(360px, calc(100vw - 36px));
    max-height: min(680px, calc(100vh - 90px));
    overflow: auto;
    background: var(--paper);
    border: 1px solid var(--ink);
    padding: 16px;
    display: none;
  }
  .demo-harness.is-open { display: block; }
  .demo-harness h2 {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    margin-bottom: 12px;
  }
  .demo-harness button {
    width: 100%;
    text-align: left;
    border: 0;
    border-top: 1px solid var(--rule);
    background: transparent;
    padding: 10px 0;
    cursor: pointer;
    font-family: var(--serif);
    color: var(--ink);
  }
  .demo-key {
    display: block;
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--ink-faint);
    margin-bottom: 3px;
  }

  @media (max-width: 680px) {
    .progress { padding: calc(12px + env(safe-area-inset-top, 0px)) 14px 12px; gap: 3px; }
    /* Clear the notch + progress bar at the top. */
    .card { padding: calc(72px + env(safe-area-inset-top, 0px)) 26px calc(96px + env(safe-area-inset-bottom, 0px)); }
    .card.is-close { padding-bottom: calc(16px + env(safe-area-inset-bottom, 0px)); }
    .card-inner { padding-bottom: 14px; }
    /* Pin the advance button to the visible bottom. The finale cost card keeps
       its receipts in the drawer on phones, so the main beat stays short. */
    .card-advance {
      position: sticky;
      left: auto;
      bottom: 4px;
      transform: none;
      margin: 14px auto 0;
      flex: 0 0 auto;
    }
    .card.is-cost .card-advance { margin-top: 14px; }
    .card-advance:hover { transform: none; }
    /* On phones the image slots are hidden and the card returns to full-width copy. */
    .visual { display: none; }
    .card.has-visual { align-items: center; }
    .card.has-visual .card-inner,
    .card.has-visual .card-inner.is-wide { width: 100%; }
    .card-inner.finale-inner,
    .card-inner.close-inner {
      width: 100%;
      margin: auto 0;
    }
    .finale-grid,
    .move-stage {
      grid-template-columns: 1fr;
      gap: 24px;
    }
    .finale-main .reveal-h,
    .move-copy .reveal-h,
    .close-stage .reveal-h {
      font-size: clamp(38px, 10.8vw, 58px);
      line-height: 1;
    }
    .finale-main .lede,
    .close-stage .lede {
      font-size: 18px;
      line-height: 1.36;
    }
    .cost-impact {
      min-height: 0;
      border-left: 0;
      border-top: 1px solid rgba(243, 234, 217, 0.24);
      padding-left: 0;
      padding-top: 20px;
    }
    .impact-kicker,
    .move-kicker {
      font-size: 8.8px;
      margin-bottom: 10px;
    }
    .impact-line {
      font-size: 28px;
      max-width: none;
    }
    .move-symbol {
      min-height: 160px;
      padding: 18px;
      flex-direction: row;
      align-items: flex-end;
    }
    .move-symbol .pglyph svg {
      width: 72px;
      height: 72px;
    }
    .move-symbol-word {
      font-size: 54px;
    }
    .move-rail { display: none; }
    .move-step {
      display: grid;
      grid-template-columns: 44px minmax(0, 1fr);
      column-gap: 12px;
      padding-top: 10px;
    }
    .move-step-index {
      grid-row: span 2;
      margin-bottom: 0;
      padding-top: 3px;
    }
    .move-step-title {
      font-size: 23px;
      margin-bottom: 5px;
    }
    .move-step-body {
      font-size: 13.5px;
    }
    .close-stage .glyph-row {
      justify-content: flex-start;
      margin-bottom: 24px;
    }
    .close-action {
      display: block;
      margin-top: 24px;
    }
    .close-action .cta {
      width: auto;
      padding: 15px 22px;
      font-size: 11px;
    }
    .close-action .qualifier {
      margin-top: 14px;
      max-width: 270px;
    }
    .turn-name { font-size: 50px; }
    .num { font-size: 132px; }
    .num-after {
      font-size: 16px;
      line-height: 1.38;
      margin-top: 14px;
    }
    .score-brief {
      margin-top: 14px;
    }
    .score-brief .brief-row {
      grid-template-columns: 1fr;
      gap: 4px;
      padding: 6px 0;
    }
    .score-brief .brief-label {
      font-size: 8.4px;
      line-height: 1.2;
    }
    .score-brief .brief-value {
      font-size: 13.3px;
      line-height: 1.24;
    }
    .shape-read-panel {
      margin-top: 12px;
    }
    .shape-read-panel .brief-row {
      grid-template-columns: 1fr;
      gap: 4px;
      padding: 5px 0;
    }
    .shape-read-panel .brief-label {
      font-size: 8.3px;
      line-height: 1.2;
    }
    .shape-read-panel .brief-value {
      font-size: 13.1px;
      line-height: 1.23;
    }
    .basis-panel {
      margin-top: 14px;
    }
    .basis-panel .brief-row {
      grid-template-columns: 1fr;
      gap: 4px;
      padding: 5px 0;
    }
    .basis-panel .brief-label {
      font-size: 8.4px;
      line-height: 1.2;
    }
    .basis-panel .brief-value {
      font-size: 13.1px;
      line-height: 1.24;
    }
    .lede { font-size: 21px; }
    .quote { font-size: 28px; }
    .quote-after {
      font-size: 15.5px;
      line-height: 1.4;
      margin-top: 20px;
    }
    .quote-lens {
      margin-top: 14px;
    }
    .quote-lens .brief-row {
      grid-template-columns: 1fr;
      gap: 4px;
      padding: 7px 0;
    }
    .quote-lens .brief-label {
      font-size: 8.4px;
      line-height: 1.2;
    }
    .quote-lens .brief-value {
      font-size: 13.3px;
      line-height: 1.25;
    }
    .reframe-panel {
      margin-top: 16px;
    }
    .reframe-panel .brief-row {
      grid-template-columns: 1fr;
      gap: 4px;
      padding: 7px 0;
    }
    .reframe-panel .brief-label {
      font-size: 8.4px;
      line-height: 1.2;
    }
    .reframe-panel .brief-value {
      font-size: 13.5px;
      line-height: 1.27;
    }
    p.body { font-size: 17px; }
    .receipt {
      grid-template-columns: 30px minmax(0, 1fr);
      gap: 10px;
      padding: 10px 0;
    }
    .receipt .rn {
      font-size: 9px;
      padding-top: 3px;
    }
    .receipt-prompt {
      font-size: 8.8px;
      margin-bottom: 4px;
    }
    .receipt-answer {
      font-size: 14.8px;
      line-height: 1.3;
    }
    .receipt-read {
      font-size: 14px;
      line-height: 1.34;
      margin-top: 5px;
    }
    .receipt-proof {
      font-size: 8px;
      line-height: 1.32;
      margin-top: 5px;
    }
    .brief-panel, .output-list { margin-top: 18px; }
    .calibration-panel { margin-top: 16px; }
    .calibration-panel .brief-row { padding: 7px 0; }
    .calibration-panel .brief-value {
      font-size: 14.6px;
      line-height: 1.3;
    }
    .constraint-panel {
      margin-top: 15px;
    }
    .constraint-panel .brief-row {
      padding: 6px 0;
    }
    .constraint-panel .brief-value {
      font-size: 13.7px;
      line-height: 1.27;
    }
    .cost-model-panel,
    .compound-panel,
    .implementation-panel {
      margin-top: 15px;
    }
    .cost-model-panel .brief-row,
    .compound-panel .brief-row,
    .implementation-panel .brief-row {
      padding: 6px 0;
    }
    .cost-model-panel .brief-value,
    .compound-panel .brief-value,
    .implementation-panel .brief-value {
      font-size: 13.8px;
      line-height: 1.28;
    }
    .brief-row {
      grid-template-columns: 1fr;
      gap: 5px;
      padding: 8px 0;
    }
    .brief-label {
      font-size: 9px;
      padding-top: 0;
    }
    .brief-value {
      font-size: 15.5px;
      line-height: 1.38;
    }
    .output-item {
      grid-template-columns: 28px minmax(0, 1fr);
      gap: 10px;
      padding: 11px 0;
      font-size: 16px;
      line-height: 1.38;
    }
    .cta {
      margin-top: 20px;
      padding: 14px 18px;
      font-size: 10px;
    }
    /* The close card is now one action: headline, offer, CTA. */
    .is-close .lede { font-size: 18px; line-height: 1.42; }
    .is-close .output-item {
      padding: 8px 0;
      font-size: 14px;
      line-height: 1.3;
    }
    .is-close .output-list { margin-top: 12px; }
    .close-line {
      font-size: 16px;
      line-height: 1.42;
      margin-top: 14px;
    }
    .is-close .cta { margin-top: 0; }
    .qualifier {
      margin-top: 12px;
      font-size: 9.5px;
      line-height: 1.45;
    }
    .beat-tag { top: 30px; right: 18px; }
  }
</style>
</head>
<body>
<div class="stage" id="stage">
  <div class="progress" id="progress"></div>
  <div class="zone prev" id="prev"></div>
  <div class="zone next" id="next"></div>
  <div class="beat-tag" id="beatTag"></div>
  <div id="cards"></div>
  <div class="hint" id="hint">Tap right to continue - left/right keys</div>

function el(tag, className, text) {
  const node = document.createElement(tag);
  if (className) node.className = className;
  if (text !== undefined) node.textContent = text;

// Authored copy may mark the most important keyword with the house serif-italic
// *single asterisk* device. Legacy double-asterisk markup is coerced to the
// same serif italic style so bold never becomes a copy crutch.
// We escape everything first (so user-derived text can never inject HTML), then
// promote only authored emphasis spans. Quotes/answers never pass through here.
function formatCopy(text) {
  const escaped = String(text == null ? '' : text)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  return escaped
    .replace(/\*\*([^*]+)\*\*/g, '<em>$1</em>')
    .replace(/\*([^*]+)\*/g, '<em>$1</em>');
}

function p(className, text, delay) {
  const node = el('p', className);
  node.innerHTML = formatCopy(text);
  if (delay) node.classList.add(delay);
  return node;
}

function h(text, delay) {
  const node = el('h2', 'reveal-h anim');
  node.innerHTML = formatCopy(text);
  if (delay) node.classList.add(delay);
  return node;
}

// Renders an authored multi-line body in full: first line as the lede, the rest
// as staggered body paragraphs. Several cards previously rendered only the first
// two lines and silently dropped the strongest authored copy; every prose card
// goes through here so that cannot happen again (see reveal_player_guard.test.js).
function appendProse(inner, lines, { skipLede = false } = {}) {
  const clean = (lines || []).map((line) => String(line || '').trim()).filter(Boolean);
  clean.forEach((line, index) => {
    if (index === 0 && !skipLede) {
      inner.append(p('lede anim d1', line));
    } else {
      inner.append(p(`body anim d${Math.min(3, index + 1)}`, line));
    }
  });
}

function buildCard(card) {
  const section = el('section', `card is-${card.type}${card.dark ? ' dark' : ''}`);
  section.dataset.beat = card.beat || '';
  if (card.peak) section.dataset.peak = card.peak;
  const mediaSpec = backgroundForCard(card);
  if (mediaSpec) {
    section.classList.add('has-media');
    section.dataset.media = mediaSpec.name;
    const media = el('div', 'card-media');
    media.dataset.asset = mediaSpec.name;
    media.style.backgroundImage = `url('../assets/img/${mediaSpec.name}.jpg')`;
    media.style.backgroundPosition = mediaSpec.position || 'center';
    section.appendChild(media);
  }
  // The abstract line-art "visual" slot is retired: it forced the cost card into
  // a narrow column (clipping long copy) and sat off-brand against the
  // photographic peaks. Cost now reads full-width like the other cream cards.
  // (ART + visualTypeFor stay defined for the guard test and future use.)
  const inner = el('div', 'card-inner');
  if (['turn', 'number', 'shape', 'hurdle', 'quote', 'cost', 'firstMove', 'close'].includes(card.type)) inner.classList.add('is-wide');
  if (['cost', 'firstMove'].includes(card.type)) inner.classList.add('finale-inner');
  if (card.type === 'close') inner.classList.add('close-inner');
  section.appendChild(inner);

  if (card.type === 'turn') {
    const mark = el('div', 'reveal-wordmark anim');
    mark.innerHTML = AA_WORDMARK;
    inner.append(mark);
    inner.append(el('div', 'eyebrow anim d1', card.eyebrow));
    inner.append(el('div', 'turn-name anim d1', card.nameLine));
    inner.append(h(card.lede, 'd2'));
    inner.append(p('body anim d3', card.body));
    // The seat/footprint "context line" was cut from the card: it read as jargon
    // ("joins and handoffs are part of this read"). It stays in the payload for
    // tests/analytics but no longer renders, keeping the opening punchier.
  } else if (card.type === 'number') {
    inner.style.textAlign = 'center';
    inner.append(el('div', 'num-label anim', card.label));
    const numWrap = el('div', 'num-wrap');
    const num = el('div', 'num', '0');
    num.dataset.target = String(card.score);
    numWrap.append(num);
    numWrap.append(el('span', 'num-denom', `/ ${card.max || 100}`));
    inner.append(numWrap);
    inner.append(p('num-after', card.after));
    if (card.interpretation?.length) {
      inner.append(buildDrawer('What this means', buildBriefPanel(card.interpretation, 'score-brief')));
    }
  } else if (card.type === 'shape') {
    inner.append(el('div', 'eyebrow anim', card.eyebrow));
    inner.append(h(card.header, 'd1'));
    inner.append(p('lede anim d2', card.lede));
    const bars = el('div', 'bars anim d3');
    card.pillars.forEach((pillar) => {
      const row = el('div', `bar-row ${pillar.role === 'hurdle' ? 'hurdle' : 'muted'}`);
      const head = el('div', 'bar-head');
      head.append(pillarIcon(pillar.icon || pillar.label, 'bar'), el('span', 'bar-name', pillar.label));
      const track = el('div', 'bar-track');
      const bench = el('div', 'bar-bench');
      bench.style.left = `${Math.min(100, pillar.benchmark || 100)}%`;
      bench.append(el('span', 'bar-benchval', String(pillar.benchmark || 100)));
      const fill = el('div', 'bar-fill');
      fill.dataset.v = String(pillar.value);
      fill.append(el('span', 'bar-myval', String(pillar.value)));
      track.append(bench, fill);
      row.append(head, track);
      // Plain-language meaning of the pillar (esp. Coherence) right where it is read.
      if (pillar.plain) row.append(el('div', 'bar-plain', pillar.plain));
      bars.append(row);
    });
    inner.append(bars);
    inner.append(el('div', 'bench-key anim d3', 'The mark on the right is where advanced brands sit.'));
    if (card.shapeRead?.length) {
      inner.append(buildDrawer('Read the shape', buildBriefPanel(card.shapeRead, 'shape-read-panel')));
    }
  } else if (card.type === 'hurdle') {
    inner.append(el('div', 'eyebrow anim', card.eyebrow));
    inner.append(pillarIcon(card.glyph, 'big anim d1'));
    inner.append(h(card.lede, 'd1'));
    inner.append(p('lede anim d2', card.body));
    inner.append(el('div', 'constraint-tag anim d3', card.close));
    if (card.evidence?.length) inner.append(buildDrawer('Show the answers behind this', buildEvidenceSupport(card.evidence)));
  } else if (card.type === 'quote') {
    inner.append(el('div', 'eyebrow anim', card.eyebrow));
    const quote = el('div', 'quote');
    quote.dataset.quote = card.quote;
    quote.setAttribute('aria-label', card.quote);
    quote.append(el('span', 'quote-mark', '"'));
    quote.append(el('span', 'quote-words'));
    quote.append(el('span', 'quote-mark', '"'));
    inner.append(quote);
    inner.append(p('quote-after', card.sowhat || card.implication));
  } else if (card.type === 'cost') {
    const grid = el('div', 'finale-grid');
    const main = el('div', 'finale-main');
    main.append(el('div', 'eyebrow anim', card.eyebrow));
    main.append(h(card.hero, 'd1'));
    main.append(p('lede anim d2', card.compound));
    const impact = el('div', 'cost-impact anim d2');
    impact.append(el('div', 'impact-kicker', 'THE BILL'));
    impact.append(pillarIcon(card.glyph, 'impact-glyph'));
    impact.append(el('div', 'impact-line', costImpactLine(card.glyph)));
    const detail = el('div', 'drawer-content');
    appendProse(detail, card.body?.length ? card.body : ['Picture the cost inside one real operating cycle.']);
    const modelRows = (card.model || []).filter((row) => ['Your number', 'Track next'].includes(row.label));
    const rows = [...modelRows, ...(card.compounders || [])];
    if (rows.length) detail.append(buildBriefPanel(rows, 'cost-model-panel'));
    main.append(buildDrawer('See the week behind this', detail));
    grid.append(main, impact);
    inner.append(grid);
  } else if (card.type === 'firstMove') {
    const stage = el('div', 'move-stage');
    const symbol = el('div', 'move-symbol anim d1');
    symbol.append(pillarIcon(card.glyph, ''));
    symbol.append(el('div', 'move-symbol-word', 'One'));
    const copy = el('div', 'move-copy');
    const eyebrow = el('div', 'eyebrow anim');
    eyebrow.append(pillarIcon(card.glyph, 'eyebrow-glyph'), document.createTextNode(card.eyebrow));
    copy.append(eyebrow);
    copy.append(h(card.header, 'd1'));
    copy.append(p('lede anim d2', card.move));
    copy.append(p('body forward anim d3', card.forward));
    copy.append(buildMoveRail(card.glyph));
    if (card.brief?.length) copy.append(buildDrawer('The exact first move', buildBriefPanel(card.brief)));
    stage.append(symbol, copy);
    inner.append(stage);
  } else if (card.type === 'close') {
    const closeStage = el('div', 'close-stage');
    closeStage.append(el('div', 'eyebrow anim', card.eyebrow));
    const motif = el('div', 'glyph-row anim d1');
    ['Visibility', 'Velocity', 'Coherence', 'Leverage'].forEach((label) => {
      motif.append(pillarIcon(label, label === card.glyph ? 'on' : 'off'));
    });
    closeStage.append(motif);
    closeStage.append(h(card.header, 'd1'));
    closeStage.append(p('lede anim d2', card.offer || card.fitBody));
    const ctaWrap = el('div', 'close-action anim d3');
    const cta = el('button', 'cta', `${card.button} →`);
    cta.type = 'button';
    cta.addEventListener('click', () => openCalendar(ctaWrap, card.calendarUrl));
    ctaWrap.append(cta);
    if (card.qualifier) ctaWrap.append(p('qualifier', card.qualifier));
    const panel = el('div', 'calendar-panel', 'Booking opens here once the scheduling link is connected.');
    ctaWrap.append(panel);
    closeStage.append(ctaWrap);
    inner.append(closeStage);
  }

  // Visible "see more" affordance on every non-final card (R3): a real button,
  // not just an invisible tap zone.
  if (card.type !== 'close') {
    const advance = el('button', `card-advance${card.dark ? ' on-dark' : ''}`, 'Continue');
    advance.type = 'button';
    advance.addEventListener('click', () => go(i + 1));
    section.append(advance);
  }
  return section;
}

function openCalendar(wrap, url) {
  // A real scheduling URL opens in a new tab (prefilled) so the reveal stays open behind it.
  // Until one is wired, the in-flow panel explains the booking step rather than dead-ending.
  if (url && /^https?:\/\//i.test(url)) {
    window.open(withInvitee(url), '_blank', 'noopener');
    return;
  }
  wrap.querySelector('.calendar-panel').classList.add('is-open');
}

function withInvitee(url) {
  try {
    const u = new URL(url);
    if (revealIdentity.name) u.searchParams.set('name', revealIdentity.name);
    if (revealIdentity.email) u.searchParams.set('email', revealIdentity.email);
    return u.toString();
  } catch (err) {
    return url;
  }
}

function mount(nextCards) {
  cards = nextCards;
  cardsHost.innerHTML = '';
  progress.innerHTML = '';
  segs = [];
  cards.forEach((card) => {
    cardsHost.append(buildCard(card));
    const seg = el('div', 'seg');
    seg.append(document.createElement('i'));
    progress.append(seg);
    segs.push(seg);
  });
  i = 0;
  loading.classList.add('is-hidden');
  render();
}

function render() {
  const sections = Array.from(document.querySelectorAll('.card'));
  sections.forEach((card, index) => card.classList.toggle('is-active', index === i));
  const card = sections[i];
  const dark = card?.classList.contains('dark');
  segs.forEach((seg, index) => {
    seg.classList.toggle('done', index < i);
    seg.classList.toggle('active', index === i);
    seg.classList.toggle('dark-ctx', dark);
  });
  // The quote, the sparse emotional peak, brings the world forward for its moment.
  // The dense cards (incl. the close + its CTA) stay on the quiet atmosphere so
  // copy and the cream pill stay crisp.
  document.body.classList.toggle('peak-forward', !!card?.dataset.peak);
  const data = cards[i] || {};
  document.body.classList.toggle('is-close-card', data.type === 'close');
  // Position only. The internal funnel labels (Problem / Agitation / Peak) are not
  // client-facing language and reading them breaks the spell of the reveal.
  beatTag.textContent = `${String(i + 1).padStart(2, '0')} / ${String(cards.length).padStart(2, '0')}`;
  beatTag.classList.toggle('on-dark', dark);
  hint.classList.toggle('on-dark', dark);
  hint.style.opacity = i >= cards.length - 1 ? '0' : i === 0 ? '1' : '0.7';
  runCardMotion(card);
}

function runCardMotion(card) {
  const num = card?.querySelector('.num');
  if (num) {
    const afterItems = Array.from(card.querySelectorAll('.num-after'));
    const target = Number(num.dataset.target || 0);
    afterItems.forEach((after) => after.classList.remove('show'));
    num.textContent = '0';
    setTimeout(() => afterItems.forEach((after) => after.classList.add('show')), 250);
    const t0 = performance.now();
    const dur = 950;
    const step = (now) => {
      const pct = Math.min(1, (now - t0) / dur);
      const eased = 1 - Math.pow(1 - pct, 3);
      num.textContent = String(Math.round(eased * target));
      if (pct < 1) requestAnimationFrame(step);
      else num.textContent = String(target);
    };
    requestAnimationFrame(step);
  }
  const bars = card?.querySelectorAll('.bar-fill') || [];
  if (bars.length) {
    bars.forEach((bar) => {
      bar.classList.remove('go');
      bar.style.width = '0';
    });
    requestAnimationFrame(() => requestAnimationFrame(() => {
      bars.forEach((bar) => {
        bar.classList.add('go');
        bar.style.width = `${bar.dataset.v}%`;
      });
    }));
  }
  const quote = card?.querySelector('.quote');
  if (quote) {
    const wordsHost = quote.querySelector('.quote-words');
    const after = card.querySelector('.quote-after');
    const lens = card.querySelector('.quote-lens');
    after.classList.remove('in');
    if (lens) lens.classList.remove('in');
    wordsHost.innerHTML = '';
    const words = String(quote.dataset.quote || '').split(/\s+/);
    words.forEach((word, index) => {
      const span = el('span', 'w', word);
      wordsHost.append(span);
      if (index < words.length - 1) wordsHost.append(document.createTextNode(' '));
    });
    const spans = wordsHost.querySelectorAll('.w');
    spans.forEach((span, index) => setTimeout(() => span.classList.add('in'), 300 + index * 40));
    const afterDelay = 300 + spans.length * 40 + 450;
    setTimeout(() => after.classList.add('in'), afterDelay);
    if (lens) setTimeout(() => lens.classList.add('in'), afterDelay + 520);
  }
}

function go(index) {
  const next = Math.max(0, Math.min(cards.length - 1, index));
  if (next === i) return;
  i = next;
  render();
}

async function loadToken(token) {
  const res = await fetch(`/api/v8/reveal?token=${encodeURIComponent(token)}`);
  const body = await res.json();
  if (!res.ok || !body.ok) throw new Error(body.error || 'Reveal failed');
  revealIdentity = { name: body.reveal.name || '', email: body.reveal.email || '' };
  revealHurdle = body.reveal.hurdle || '';
  document.title = `${body.reveal.characterName} - AI Readiness Diagnostic`;
  mount(body.reveal.cards);
}

async function loadDemo(key) {
  // Read-only demo endpoint: no submit, no Turnstile, no email/Brevo side effects.
  const demoKey = DEMO_SCENARIOS[key] ? key : 't-ve';
  const res = await fetch(`/api/v8/reveal?demo=${encodeURIComponent(demoKey)}`);
  const body = await res.json();
  if (!res.ok || !body.ok) throw new Error(body.error || 'Demo failed');
  revealIdentity = { name: body.reveal.name || '', email: body.reveal.email || '' };
  revealHurdle = body.reveal.hurdle || '';
  document.title = `${body.reveal.characterName} - AI Readiness Diagnostic`;
  mount(body.reveal.cards);
}

function buildDemoHarness() {
  demoList.innerHTML = '';
  Object.entries(DEMO_SCENARIOS).forEach(([key, scenario]) => {
    const button = document.createElement('button');
    button.type = 'button';
    button.innerHTML = `<span class="demo-key">${key}</span>${scenario.label}`;
    button.addEventListener('click', () => {
      loading.classList.remove('is-hidden');
      demoHarness.classList.remove('is-open');
      loadDemo(key).catch(showError);
    });
    demoList.append(button);
  });
}

function showError(err) {
  const code = err && err.message;
  loading.textContent = (code === 'invalid_token' || code === 'missing_token')
    ? 'This profile link is no longer valid. Ask A+A for a fresh copy.'
    : 'We could not open this profile. Please use your A+A invitation link.';
  loading.classList.remove('is-hidden');
}

function showNeutral() {
  loading.textContent = 'Open your profile from your A+A invitation link.';
  loading.classList.remove('is-hidden');
}

document.getElementById('next').addEventListener('click', () => go(i + 1));
document.getElementById('prev').addEventListener('click', () => go(i - 1));
document.addEventListener('keydown', (event) => {
  if (event.key === 'ArrowRight' || event.key === ' ') {
    event.preventDefault();
    go(i + 1);
  }
  if (event.key === 'ArrowLeft') {
    event.preventDefault();
    go(i - 1);
  }
});
demoLaunch.addEventListener('click', () => demoHarness.classList.toggle('is-open'));
buildDemoHarness();

const token = params.get('token');
const demoKey = params.get('demo');
const demoNavOn = params.get('demoNav') === '1';
if (token) loadToken(token).catch(showError);
// Demo only runs on explicit opt-in (?demo=… or ?demoNav=1). A bare, tokenless /reveal/
// no longer auto-submits a demo (which would mint a Brevo contact); it shows a neutral state.
else if (demoKey || demoNavOn) loadDemo(demoKey || 't-ve').catch(showError);
else showNeutral();
</script>
</body>
